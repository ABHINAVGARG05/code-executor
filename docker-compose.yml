services:
  # Scoped Docker API proxy — whitelists only endpoints needed by executors
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - VERSION=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    privileged: false
    mem_limit: 32m
    restart: unless-stopped

  # Build-only: sandbox images for per-job execution containers
  sandbox-go:
    image: code-exec-sandbox-go:latest
    build:
      context: .
      dockerfile: sandbox-images/go/Dockerfile
    profiles: ["build"]

  sandbox-cpp:
    image: code-exec-sandbox-cpp:latest
    build:
      context: .
      dockerfile: sandbox-images/cpp/Dockerfile
    profiles: ["build"]

  # Local AWS emulator for fully local development
  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=dynamodb,s3,sqs
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - DATA_DIR=/tmp/localstack/data
      - SKIP_INFRA_DOWNLOADS=1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped

  # Provision DynamoDB table, S3 bucket, and SQS queue on startup
  localstack-init:
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/localstack-init.sh"]
    depends_on:
      localstack:
        condition: service_healthy
    mem_limit: 64m
    profiles: ["local"]

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-fake}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-fake}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://localstack:4566}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-code-exec-jobs}
      - CODE_EXEC_BUCKET=${CODE_EXEC_BUCKET:-code-exec-outputs}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL:-http://localstack:4566/000000000000/code-exec-queue}
    ports:
      - "8080:8080"
    depends_on:
      localstack-init:
        condition: service_completed_successfully
        required: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  executor-go:
    build:
      context: .
      dockerfile: executor-go/Dockerfile
    image: code-executor-go:latest
    depends_on:
      - docker-socket-proxy
      localstack-init:
        condition: service_completed_successfully
        required: false
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-fake}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-fake}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://localstack:4566}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-code-exec-jobs}
      - CODE_EXEC_BUCKET=${CODE_EXEC_BUCKET:-code-exec-outputs}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL:-http://localstack:4566/000000000000/code-exec-queue}
      - EXEC_TIMEOUT_SEC=10
      - SANDBOX_IMAGE=code-exec-sandbox-go:latest
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    restart: unless-stopped

  executor-cpp:
    build:
      context: .
      dockerfile: executor-cpp/Dockerfile
    image: code-executor-cpp:latest
    depends_on:
      - docker-socket-proxy
      localstack-init:
        condition: service_completed_successfully
        required: false
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-fake}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-fake}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://localstack:4566}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-code-exec-jobs}
      - CODE_EXEC_BUCKET=${CODE_EXEC_BUCKET:-code-exec-outputs}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL:-http://localstack:4566/000000000000/code-exec-queue}
      - EXEC_TIMEOUT_SEC=10
      - SANDBOX_IMAGE=code-exec-sandbox-cpp:latest
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    restart: unless-stopped
