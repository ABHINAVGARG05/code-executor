services:
  # Scoped Docker API proxy — whitelists only endpoints needed by executors
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - VERSION=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    privileged: false
    mem_limit: 32m
    restart: unless-stopped

  # Build-only: sandbox images for per-job execution containers
  sandbox-go:
    image: code-exec-sandbox-go:latest
    build:
      context: .
      dockerfile: sandbox-images/go/Dockerfile
    profiles: ["build"]

  sandbox-cpp:
    image: code-exec-sandbox-cpp:latest
    build:
      context: .
      dockerfile: sandbox-images/cpp/Dockerfile
    profiles: ["build"]

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE}
      - CODE_EXEC_BUCKET=${CODE_EXEC_BUCKET}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
    ports:
      - "8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  executor-go:
    build:
      context: .
      dockerfile: executor-go/Dockerfile
    image: code-executor-go:latest
    depends_on:
      - docker-socket-proxy
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE}
      - CODE_EXEC_BUCKET=${CODE_EXEC_BUCKET}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
      - EXEC_TIMEOUT_SEC=10
      - SANDBOX_IMAGE=code-exec-sandbox-go:latest
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    restart: unless-stopped

  executor-cpp:
    build:
      context: .
      dockerfile: executor-cpp/Dockerfile
    image: code-executor-cpp:latest
    depends_on:
      - docker-socket-proxy
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE}
      - CODE_EXEC_BUCKET=${CODE_EXEC_BUCKET}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
      - EXEC_TIMEOUT_SEC=10
      - SANDBOX_IMAGE=code-exec-sandbox-cpp:latest
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    restart: unless-stopped
